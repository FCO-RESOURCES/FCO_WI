<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCO | Central Command</title>
    <style>
        :root { --orange: #ff8c00; --bg: #0c0808; --card: #151010; --text: #ffaa32; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', monospace; margin: 0; overflow: hidden; display: flex; height: 100vh; }
        
        /* Login Overlay */
        #login-overlay { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; border: 5px solid var(--orange); }
        .login-box { text-align: center; width: 350px; }
        
        /* Sidebar */
        .sidebar { width: 260px; border-right: 2px solid var(--orange); background: #050303; display: flex; flex-direction: column; padding: 20px; }
        .sidebar h2 { font-size: 1.2rem; margin-bottom: 30px; letter-spacing: 2px; text-align: center; border-bottom: 1px solid var(--orange); padding-bottom: 10px; }
        .nav-btn { background: transparent; color: var(--text); border: 1px solid #444; padding: 12px; margin-bottom: 10px; cursor: pointer; text-align: left; transition: 0.3s; font-family: monospace; }
        .nav-btn:hover { background: var(--orange); color: #000; border-color: var(--orange); }
        .nav-btn.active { background: var(--orange); color: #000; }

        /* Main Content */
        .main { flex: 1; padding: 40px; overflow-y: auto; position: relative; }
        .tab-content { display: none; animation: fadeIn 0.4s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card); border-left: 4px solid var(--orange); padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { color: var(--orange); margin-top: 0; font-size: 1.8rem; }

        input, textarea { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; font-family: monospace; outline: none; margin-bottom: 10px; }
        input:focus, textarea:focus { border-color: var(--orange); }
        
        button.action-btn { background: var(--orange); color: #000; border: none; padding: 12px 24px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        button.action-btn:hover { background: #fff; }

        .log-container { display: flex; flex-direction: column; gap: 8px; }
        .log-entry { display: flex; justify-content: space-between; background: #000; padding: 10px; border: 1px solid #222; font-size: 14px; }
        .log-time { color: #888; margin-right: 15px; }
        .log-user { color: var(--orange); font-weight: bold; margin-right: 15px; }
        .log-cmd { color: #00ff00; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h1 style="letter-spacing: 5px;">SECURITY LOCK</h1>
            <p>AUTHORIZED PERSONNEL ONLY</p>
            <input type="password" id="pass-input" placeholder="ACCESS KEY...">
            <button class="action-btn" onclick="attemptLogin()" style="width: 100%;">AUTHORIZE</button>
        </div>
    </div>

    <div class="sidebar">
        <h2>FCO COMMAND</h2>
        <button class="nav-btn active" onclick="openTab(event, 'dashboard')">01 // DASHBOARD</button>
        <button class="nav-btn" onclick="openTab(event, 'logs')">02 // STAFF LOGS</button>
        <button class="nav-btn" onclick="openTab(event, 'editor')">03 // CHANGELOG</button>
    </div>

    <div class="main">
        <div id="dashboard" class="tab-content active">
            <h1>> COMMANDER DASHBOARD</h1>
            <div class="card">
                <h3>Global Server Controls</h3>
                <p>These actions affect all server instances immediately.</p>
                <button class="action-btn" style="background: #ff3200;" onclick="alert('Command Sent!')">Emergency Shutdown</button>
                <button class="action-btn" onclick="alert('Command Sent!')">Global Restart</button>
            </div>
        </div>

        <div id="logs" class="tab-content">
            <h1>> AUDIT LOGS</h1>
            <div class="card">
                <div id="log-list" class="log-container">Fetching data...</div>
            </div>
        </div>

        <div id="editor" class="tab-content">
            <h1>> DATABASE UPDATES</h1>
            <div class="card">
                <h3>Edit Public Changelog</h3>
                <textarea id="changelog-input" rows="15" placeholder="Enter updates here..."></textarea>
                <button class="action-btn" onclick="saveChangelog()">Update Public Database</button>
            </div>
        </div>
    </div>

    <script>
        // --- YOUR CLOUDFLARE URL ---
        const API = "https://twilight-bush-9ecb.luku-di456.workers.dev"; 
        let SESSION_PASS = "";

        async function attemptLogin() {
            const input = document.getElementById('pass-input');
            SESSION_PASS = input.value;
            const success = await refreshData();
            if (success) {
                document.getElementById('login-overlay').style.display = 'none';
            } else {
                alert("ACCESS DENIED: INVALID KEY");
                input.value = "";
            }
        }

        async function refreshData() {
            try {
                const response = await fetch(`${API}/get-admin-data`, {
                    headers: { "Authorization": SESSION_PASS }
                });
                if (response.status === 403) return false;
                const data = await response.json();
                
                const logList = document.getElementById('log-list');
                if (data.logs.length === 0) {
                    logList.innerHTML = "No logs found in database.";
                } else {
                    logList.innerHTML = data.logs.map(log => `
                        <div class="log-entry">
                            <span>
                                <span class="log-time">[${new Date(log.time).toLocaleTimeString()}]</span>
                                <span class="log-user">${log.user}</span>
                            </span>
                            <span class="log-cmd">${log.cmd}</span>
                        </div>
                    `).join('');
                }
                document.getElementById('changelog-input').value = data.changelog;
                return true;
            } catch (err) { return false; }
        }

        async function saveChangelog() {
            const text = document.getElementById('changelog-input').value;
            const response = await fetch(`${API}/update-changelog`, {
                method: "POST",
                headers: { "Authorization": SESSION_PASS, "Content-Type": "application/json" },
                body: JSON.stringify({ text: text })
            });
            if (response.ok) { alert("DATABASE UPDATED SUCCESSFULLY"); } 
            else { alert("ERROR: SESSION EXPIRED"); }
        }

        function openTab(evt, tabName) {
            let content = document.getElementsByClassName("tab-content");
            for (let i = 0; i < content.length; i++) content[i].classList.remove("active");
            let btns = document.getElementsByClassName("nav-btn");
            for (let i = 0; i < btns.length; i++) btns[i].classList.remove("active");
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
            if(tabName !== 'dashboard') refreshData();
        }

        setInterval(() => { if (SESSION_PASS !== "") refreshData(); }, 30000);
    </script>
</body>
</html>
