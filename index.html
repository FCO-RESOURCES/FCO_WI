<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FCO | Command Console</title>
    <style>
        :root { --orange: #ff8c00; --bg: #0c0808; --card: #151010; --text: #ffaa32; --border: #333; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh;
            flex-direction: row;
        }

        /* --- LOGIN OVERLAY --- */
        #login-overlay { 
            position: fixed; 
            inset: 0; 
            background: #000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 10000; 
            padding: 20px;
        }
        .login-box { 
            text-align: center; 
            width: 100%; 
            max-width: 400px; 
            border: 2px solid var(--orange);
            padding: 30px;
            background: var(--card);
        }

        /* --- SIDEBAR / NAVIGATION --- */
        .sidebar { 
            width: 280px; 
            border-right: 2px solid var(--orange); 
            background: #050303; 
            display: flex; 
            flex-direction: column; 
            padding: 20px;
            flex-shrink: 0;
        }
        .sidebar h2 { 
            font-size: 1.2rem; 
            margin-bottom: 30px; 
            letter-spacing: 2px; 
            text-align: center; 
            border-bottom: 1px solid var(--orange); 
            padding-bottom: 15px;
            color: var(--orange);
        }
        .nav-btn { 
            background: transparent; 
            color: var(--text); 
            border: 1px solid var(--border); 
            padding: 15px; 
            margin-bottom: 10px; 
            cursor: pointer; 
            text-align: left; 
            transition: 0.2s; 
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            font-weight: bold;
        }
        .nav-btn:hover, .nav-btn.active { 
            background: var(--orange); 
            color: #000; 
            border-color: var(--orange); 
        }

        /* --- MAIN CONTENT --- */
        .main { 
            flex: 1; 
            padding: 30px; 
            overflow-y: auto; 
            position: relative; 
            -webkit-overflow-scrolling: touch;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { 
            background: var(--card); 
            border-left: 5px solid var(--orange); 
            padding: 20px; 
            margin-bottom: 25px; 
            border-radius: 2px;
        }
        h1 { color: var(--orange); margin-top: 0; font-size: 1.6rem; text-transform: uppercase; }
        h3 { margin-top: 0; font-size: 1.1rem; }

        input, textarea { 
            width: 100%; 
            background: #000; 
            border: 1px solid var(--border); 
            color: #fff; 
            padding: 15px; 
            font-family: monospace; 
            outline: none; 
            margin-bottom: 15px;
            font-size: 16px; /* Prevents auto-zoom on iOS */
        }
        textarea { resize: vertical; min-height: 200px; }
        
        .action-btn { 
            background: var(--orange); 
            color: #000; 
            border: none; 
            padding: 15px 25px; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase; 
            width: 100%;
            font-size: 14px;
        }

        /* --- LOGS --- */
        .log-entry { 
            background: #000; 
            padding: 12px; 
            border: 1px solid #222; 
            font-size: 13px; 
            margin-bottom: 8px;
            line-height: 1.5;
        }
        .log-time { color: #888; font-weight: bold; display: block; margin-bottom: 4px; }
        .log-user { color: var(--orange); font-weight: bold; }
        .log-cmd { color: #00ff00; word-break: break-all; }

        /* --- MOBILE ADAPTATION --- */
        @media (max-width: 850px) {
            body { flex-direction: column; }
            .sidebar { 
                width: 100%; 
                border-right: none; 
                border-bottom: 2px solid var(--orange); 
                padding: 10px;
                height: auto;
            }
            .sidebar h2 { margin-bottom: 10px; font-size: 1rem; padding-bottom: 5px; }
            .nav-container { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 5px; }
            .nav-btn { 
                margin-bottom: 0; 
                flex: 1; 
                white-space: nowrap; 
                padding: 10px; 
                font-size: 12px; 
                text-align: center;
            }
            .main { padding: 20px; }
            h1 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h1 style="letter-spacing: 3px;">TERMINAL ACCESS</h1>
            <p style="font-size: 12px; margin-bottom: 20px;">KEY AUTHORIZATION REQUIRED</p>
            <input type="password" id="pass-input" placeholder="ENTER ACCESS KEY">
            <button class="action-btn" onclick="attemptLogin()">AUTHORIZE</button>
        </div>
    </div>

    <div class="sidebar">
        <h2>FCO COMMAND</h2>
        <div class="nav-container">
            <button class="nav-btn active" onclick="openTab(event, 'dashboard')">DASHBOARD</button>
            <button class="nav-btn" onclick="openTab(event, 'logs')">AUDIT LOGS</button>
            <button class="nav-btn" onclick="openTab(event, 'editor')">CHANGELOG</button>
        </div>
    </div>

    <div class="main">
        <!-- Dashboard -->
        <div id="dashboard" class="tab-content active">
            <h1>> SYSTEM STATUS</h1>
            <div class="card">
                <h3>Global Server Actions</h3>
                <p style="font-size: 14px; color: #888;">Broadcast commands to all active mainframes.</p>
                <button class="action-btn" style="background: #ff3200; margin-bottom: 10px;" onclick="alert('Shutdown Signal Sent')">Emergency Shutdown</button>
                <button class="action-btn" onclick="alert('Restart Signal Sent')">Global Restart</button>
            </div>
        </div>

        <!-- Staff Logs -->
        <div id="logs" class="tab-content">
            <h1>> STAFF ACTIVITY</h1>
            <div id="log-list">
                <div class="card">Fetching encrypted logs...</div>
            </div>
        </div>

        <!-- Changelog Editor -->
        <div id="editor" class="tab-content">
            <h1>> DATABASE UPDATE</h1>
            <div class="card">
                <h3>System Changelog</h3>
                <textarea id="changelog-input" placeholder="Enter version updates..."></textarea>
                <button class="action-btn" onclick="saveChangelog()">Update Public Database</button>
            </div>
        </div>
    </div>

    <script>
        const API = "https://twilight-bush-9ecb.luku-di456.workers.dev";
        let SESSION_PASS = "";

        async function attemptLogin() {
            const input = document.getElementById('pass-input');
            SESSION_PASS = input.value;
            const success = await refreshData();
            if (success) {
                document.getElementById('login-overlay').style.display = 'none';
            } else {
                alert("AUTHORIZATION FAILED");
                input.value = "";
            }
        }

        async function refreshData() {
            try {
                const response = await fetch(`${API}/get-admin-data`, {
                    headers: { "Authorization": SESSION_PASS }
                });
                if (response.status === 403) return false;
                const data = await response.json();
                
                const logList = document.getElementById('log-list');
                if (data.logs.length === 0) {
                    logList.innerHTML = '<div class="card">No logs found.</div>';
                } else {
                    logList.innerHTML = data.logs.map(log => `
                        <div class="log-entry">
                            <span class="log-time">[${new Date(log.time).toLocaleString()}]</span>
                            <span class="log-user">${log.user}</span> executed: <span class="log-cmd">${log.cmd}</span>
                        </div>
                    `).join('');
                }
                document.getElementById('changelog-input').value = data.changelog;
                return true;
            } catch (err) { return false; }
        }

        async function saveChangelog() {
            const text = document.getElementById('changelog-input').value;
            const response = await fetch(`${API}/update-changelog`, {
                method: "POST",
                headers: { "Authorization": SESSION_PASS, "Content-Type": "application/json" },
                body: JSON.stringify({ text: text })
            });
            if (response.ok) alert("DATABASE UPDATED");
            else alert("ERROR: SESSION EXPIRED");
        }

        function openTab(evt, tabName) {
            let content = document.getElementsByClassName("tab-content");
            for (let i = 0; i < content.length; i++) content[i].classList.remove("active");
            let btns = document.getElementsByClassName("nav-btn");
            for (let i = 0; i < btns.length; i++) btns[i].classList.remove("active");
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
            if(tabName !== 'dashboard') refreshData();
        }

        setInterval(() => { if (SESSION_PASS !== "") refreshData(); }, 30000);
    </script>
</body>
</html>
